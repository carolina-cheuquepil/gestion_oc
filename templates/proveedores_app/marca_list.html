{% extends "layouts/base.html" %}
{% block title %}Marcas{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Marcas</h1>
  <a class="btn btn-primary" href="{% url 'marca-nueva' %}">
    <i class="bi bi-plus-lg me-1"></i>Nueva Marca
  </a>
</div>

<div class="table-wrapper">
  <table class="table table-hover">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      {% for m in marcas %}
      <tr>
        <td class="text-muted">{{ m.marca_id }}</td>
        <td>{{ m.marca_nombre }}</td>
        <td>
          <a class="btn btn-sm btn-outline-secondary" href="{% url 'marca-editar' pk=m.pk %}">
            <i class="bi bi-pencil me-1"></i>Editar
          </a>
        </td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="3" class="text-center text-muted py-4">No hay marcas registradas.</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
