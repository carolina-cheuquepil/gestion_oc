{% load static %} 
<!DOCTYPE html> 
<html lang="es"> 

<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Portal de Soporte Dimarsa">
  <title>{% block title %}Soporte Dimarsa{% endblock %}</title> 
  
  <link rel="icon" href="{% static 'img/favicon.ico' %}?v=4">

  <!-- Bootstrap -->
  <link 
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
  rel="stylesheet" 
  > 

  <!-- Paso 3 de estilo-->
  
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  {% block extra_css %}{% endblock %} 
</head> 

<body>
  <header class="header">
  <div class="container d-flex align-items-center justify-content-between py-2">
    <a href="/" class="d-inline-flex align-items-center text-decoration-none">
      <img src="{% static 'img/logo-dimarsa.svg' %}" class="logo" alt="Dimarsa">
    </a>
    <span class="header-title">Soporte Dimarsa</span>
  </div>
  <div class="header-accent"></div>
</header>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Maestros</div>

      <a class="sidebar-link" href="{% url 'holdings_ui' %}">Holding</a>
      <a class="sidebar-link" href="/">Sucursales</a>
      <a class="sidebar-link" href="{% url 'proveedores_ui' %}">Proveedores</a>
      <a class="sidebar-link" href="/">Activos fijos</a>
      <a class="sidebar-link" href="{% url 'personas_ui' %}">Persona</a>
    </div>
  </aside>

  <main class="content">
    {% block content %}{% endblock %}
  </main>
</div>

  {% block extra_js %}{% endblock %}

</body> 
</html>
