{% extends "layouts/base.html" %}
{% block title %}Eliminar correo{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Eliminar correo</h1>
  <a class="btn btn-outline-secondary" href="{% url 'correos_destinatarios_list' %}">
    <i class="bi bi-arrow-left me-1"></i>Volver
  </a>
</div>

<form method="post" class="card border-0 shadow-sm">
  {% csrf_token %}
  <div class="card-body p-4">
    <p class="mb-1">Se eliminara el siguiente destinatario:</p>
    <p class="mb-0 fw-semibold">{{ correo.get_tipo_display }} - {{ correo.email }}</p>
  </div>
  <div class="card-footer bg-white d-flex gap-2 justify-content-end">
    <a class="btn btn-outline-secondary" href="{% url 'correos_destinatarios_list' %}">Cancelar</a>
    <button type="submit" class="btn btn-danger">
      <i class="bi bi-trash me-1"></i>Eliminar
    </button>
  </div>
</form>
{% endblock %}
